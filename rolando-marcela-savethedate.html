<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rolando & Marcela · Save the Date</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cream: #f5f0e8; --dark: #1a1a18; --gold: #c9a96e;
    --gold-light: #e8d5a3; --gray: #8a8578;
  }
  body {
    background: var(--dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Jost', sans-serif;
    overflow: hidden; touch-action: none;
  }
  #intro-screen {
    position: fixed; inset: 0; background: var(--dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; text-align: center; padding: 2rem;
    animation: fadeIn 1.2s ease;
  }
  .eyebrow {
    font-weight: 200; font-size: 0.7rem; letter-spacing: 0.4em;
    color: var(--gold); text-transform: uppercase; margin-bottom: 1.8rem;
    opacity: 0; animation: slideUp 0.8s ease 0.4s forwards;
  }
  #intro-screen h1 {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: clamp(2.8rem, 8vw, 5rem); color: var(--cream);
    line-height: 1.05; opacity: 0; animation: slideUp 0.8s ease 0.7s forwards;
    margin-bottom: 0.3rem;
  }
  #intro-screen h1 em { font-style: italic; color: var(--gold-light); }
  .subtitle {
    font-weight: 200; font-size: 0.75rem; letter-spacing: 0.3em;
    color: var(--gray); text-transform: uppercase; margin: 1.8rem 0 2rem;
    opacity: 0; animation: slideUp 0.8s ease 1s forwards;
  }
  .intro-chars {
    display: flex; gap: 1.5rem; align-items: flex-end;
    margin-bottom: 2rem;
    opacity: 0; animation: slideUp 0.8s ease 1.1s forwards;
  }
  .intro-chars img { width: 52px; image-rendering: pixelated; }
  .hint {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.1rem; color: var(--gray);
    opacity: 0; animation: slideUp 0.8s ease 1.3s forwards; margin-bottom: 2rem;
  }
  #start-btn {
    background: transparent; border: 1px solid var(--gold);
    color: var(--gold); font-family: 'Jost', sans-serif;
    font-weight: 300; font-size: 0.7rem; letter-spacing: 0.4em;
    text-transform: uppercase; padding: 1rem 2.5rem; cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0; animation: slideUp 0.8s ease 1.6s forwards;
  }
  #start-btn:hover { background: var(--gold); color: var(--dark); }

  #game-wrapper {
    display: none; flex-direction: column;
    align-items: center; width: 100%; max-width: 480px; padding: 0 1rem;
  }
  #game-header {
    width: 100%; display: flex; justify-content: space-between;
    align-items: center; padding: 0.8rem 0; margin-bottom: 0.5rem;
  }
  #game-header .names {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--gold-light); font-size: 1.1rem;
  }
  #level-info {
    font-weight: 200; font-size: 0.65rem; letter-spacing: 0.3em;
    color: var(--gray); text-transform: uppercase;
  }
  canvas {
    display: block; border: 1px solid #2a2a26; background: #111110;
    image-rendering: pixelated; width: 100%; max-width: 480px; border-radius: 2px;
  }
  #controls {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 480px; padding: 1rem 0; gap: 1rem;
  }
  .ctrl-group { display: flex; gap: 0.5rem; }
  .ctrl-btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: 1px solid #2a2a26; background: #1a1a18;
    color: var(--gold); font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .ctrl-btn:active, .ctrl-btn.pressed { background: #2a2a26; }
  #keyboard-hint {
    font-weight: 200; font-size: 0.6rem; letter-spacing: 0.25em;
    color: #3a3a36; text-align: center; margin-top: 0.3rem; text-transform: uppercase;
  }

  #end-screen {
    display: none; position: fixed; inset: 0; background: var(--dark);
    flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; text-align: center; padding: 2rem;
  }
  .decorative-line {
    width: 60px; height: 1px; background: var(--gold); margin: 0 auto 2rem;
    opacity: 0; animation: expand 1s ease 0.3s forwards;
  }
  .pre-title {
    font-weight: 200; font-size: 0.65rem; letter-spacing: 0.5em;
    color: var(--gold); text-transform: uppercase; margin-bottom: 1.5rem;
    opacity: 0; animation: slideUp 0.8s ease 0.5s forwards;
  }
  #end-screen h2 {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: clamp(2.5rem, 8vw, 4.5rem); color: var(--cream);
    line-height: 1; opacity: 0; animation: slideUp 0.8s ease 0.8s forwards;
    margin-bottom: 0.1rem;
  }
  #end-screen h2 em { font-style: italic; color: var(--gold-light); }
  .ampersand {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: clamp(1.8rem, 5vw, 3rem); color: var(--gold);
    display: block; line-height: 1.2;
    opacity: 0; animation: slideUp 0.8s ease 1s forwards;
  }
  .end-chars {
    display: flex; gap: 2rem; align-items: flex-end;
    margin: 1.5rem auto 0;
    opacity: 0; animation: slideUp 0.8s ease 1.1s forwards;
  }
  .end-chars img { width: 48px; image-rendering: pixelated; }
  .date-block {
    margin: 1.5rem auto;
    opacity: 0; animation: slideUp 0.8s ease 1.3s forwards;
  }
  .date-label {
    font-weight: 200; font-size: 0.6rem; letter-spacing: 0.5em;
    color: var(--gray); text-transform: uppercase; margin-bottom: 0.8rem;
  }
  .date {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 4vw, 1.8rem); color: var(--cream); letter-spacing: 0.1em;
  }
  .save-badge {
    display: inline-block; border: 1px solid var(--gold);
    font-weight: 200; font-size: 0.6rem; letter-spacing: 0.5em;
    color: var(--gold); text-transform: uppercase; padding: 0.8rem 2rem;
    margin-top: 0.8rem;
    opacity: 0; animation: slideUp 0.8s ease 1.6s forwards;
  }
  .bottom-line {
    width: 60px; height: 1px; background: var(--gold); margin: 2rem auto 0;
    opacity: 0; animation: expand 1s ease 1.8s forwards;
  }

  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes slideUp {
    from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}
  }
  @keyframes expand {
    from{opacity:0;width:0} to{opacity:1;width:60px}
  }
</style>
</head>

  if (keys['ArrowRight']||keys['right']) { p.vx=SPEED;  p.facing=1;  moving=true; }
  if (!moving) p.vx*=0.75;
  if ((keys['ArrowUp']||keys[' ']||keys['jump'])&&p.onGround) { p.vy=JUMP; p.onGround=false; }
  p.vy+=GRAV; p.x+=p.vx; p.y+=p.vy;
  if (moving&&p.onGround) { p.frameTimer++; if(p.frameTimer>8){p.frame=(p.frame+1)%2;p.frameTimer=0;} } else p.frame=0;
  p.onGround=false;
  for (let pl of levels[level].platforms) {
    if (p.x+p.w>pl.x&&p.x<pl.x+pl.w&&p.y+p.h>pl.y&&p.y+p.h<pl.y+pl.h+10&&p.vy>=0) {
      p.y=pl.y-p.h; p.vy=0; p.onGround=true;
    }
  }
  if (p.x<0) p.x=0;
  if (p.x+p.w>W) p.x=W-p.w;
  if (p.y>H+60) resetPlayer();
  for (let c of coins) {
    if (!c.alive) continue;
    const dx=(p.x+p.w/2)-(c.x+c.r), dy=(p.y+p.h/2)-(c.y+c.r);
    if (Math.sqrt(dx*dx+dy*dy)<p.w/2+c.r+2) { c.alive=false; collected++; totalCoins++; }
    c.anim+=0.04;
  }
  const g=levels[level].goal;
  if (!levelComplete&&p.x+p.w>g.x&&p.x<g.x+22&&p.y+p.h>g.y&&p.y<g.y+32) {
    levelComplete=true; completeTimer=0;
  }
  if (levelComplete) {
    completeTimer++;
    if (completeTimer>80) {
      if (level<levels.length-1) { level++; loadLevel(level); }
      else winGame();
    }
  }
}

function drawPlatform(pl) {
  ctx.fillStyle=C.platform; ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
  ctx.fillStyle=C.platformEdge; ctx.fillRect(pl.x,pl.y,pl.w,2);
  ctx.fillStyle='#222220';
  for(let i=pl.x+8;i<pl.x+pl.w-4;i+=12) ctx.fillRect(i,pl.y+6,2,2);
}

function drawPlayer() {
  if (!spriteR.complete) return;
  ctx.save();
  ctx.translate(p.x+p.w/2, p.y+p.h/2);
  if (p.facing===-1) ctx.scale(-1,1);
  // bob when walking
  const bobY = (p.onGround && p.frame===1) ? 1 : 0;
  ctx.drawImage(spriteR, -p.w/2, -p.h/2 + bobY, p.w, p.h);
  ctx.restore();
}

function drawGoal(g) {
  // Show marcela sprite at goal
  if (!spriteM.complete) return;
  const t=Date.now()/1000;
  // glow
  const grd=ctx.createRadialGradient(g.x+11,g.y+16,0,g.x+11,g.y+16,28);
  grd.addColorStop(0,`rgba(201,169,110,${0.12+0.05*Math.sin(t*2)})`);
  grd.addColorStop(1,'rgba(201,169,110,0)');
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.arc(g.x+11,g.y+16,28,0,Math.PI*2); ctx.fill();
  // draw marcela
  ctx.drawImage(spriteM, g.x-2, g.y, 26, 38);
  // heart above
  ctx.fillStyle=C.gold;
  ctx.font=`${10+2*Math.sin(t*3)}px serif`;
  ctx.textAlign='center';
  ctx.fillText('♥', g.x+11, g.y-6);
}

function drawCoin(c) {
  if (!c.alive) return;
  const bob=Math.sin(c.anim)*2;
  const size=16;
  ctx.save(); ctx.translate(c.x+c.r, c.y+c.r+bob);
  // glow
  const grd=ctx.createRadialGradient(0,0,0,0,0,size);
  grd.addColorStop(0,'rgba(232,213,163,0.18)'); grd.addColorStop(1,'rgba(232,213,163,0)');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(0,0,size,0,Math.PI*2); ctx.fill();
  if (spriteRing.complete) {
    ctx.drawImage(spriteRing, -size/2, -size/2, size, size);
  }
  ctx.restore();
}

function drawStars() {
  if (!drawStars._s) drawStars._s=Array.from({length:30},()=>({x:Math.random()*W,y:Math.random()*H*0.6,s:Math.random()*1.5+0.3,a:Math.random()}));
  const t=Date.now()/1000;
  for (let s of drawStars._s) {
    ctx.globalAlpha=0.3+0.2*Math.sin(t*0.5+s.a*5);
    ctx.fillStyle=C.star; ctx.fillRect(s.x,s.y,s.s,s.s);
  }
  ctx.globalAlpha=1;
}

function drawHUD() {
  for (let i=0;i<levels[level].totalCoins;i++) {
    const cx=10+i*14, cy=8;
    if (spriteRing.complete) {
      ctx.globalAlpha = i<collected ? 1.0 : 0.25;
      ctx.drawImage(spriteRing, cx-6, cy-6, 12, 12);
      ctx.globalAlpha = 1;
    }
  }
  if (levelComplete) {
    ctx.fillStyle='rgba(17,17,16,0.65)'; ctx.fillRect(0,H/2-25,W,50);
    ctx.fillStyle=C.coin; ctx.font='italic 300 18px Cormorant Garamond,serif'; ctx.textAlign='center';
    ctx.fillText(level<levels.length-1?'— Siguiente paso —':'— ¡Llegaron juntos! —',W/2,H/2+6);
  }
}

function draw() {
  ctx.clearRect(0,0,W,H); ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H);
  drawStars();
  levels[level].platforms.forEach(drawPlatform);
  coins.forEach(drawCoin);
  drawGoal(levels[level].goal);
  drawPlayer();
  drawHUD();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

function setupBtn(id,key) {
  const btn=document.getElementById(id);
  btn.addEventListener('pointerdown',e=>{keys[key]=true;btn.classList.add('pressed');e.preventDefault();});
  btn.addEventListener('pointerup',e=>{keys[key]=false;btn.classList.remove('pressed');});
  btn.addEventListener('pointerleave',e=>{keys[key]=false;btn.classList.remove('pressed');});
}
setupBtn('btn-left','left'); setupBtn('btn-right','right'); setupBtn('btn-jump','jump');

function startGame() {
  document.getElementById('intro-screen').style.display='none';
  document.getElementById('game-wrapper').style.display='flex';
  level=0; totalCoins=0; loadLevel(0); gameRunning=true; gameWon=false;
  loop();
}

function winGame() {
  gameRunning=false; gameWon=true;
  setTimeout(()=>{
    document.getElementById('game-wrapper').style.display='none';
    document.getElementById('end-screen').style.display='flex';
  },600);
}
</script>
</body>
